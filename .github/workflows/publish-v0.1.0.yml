name: publish-v0.1.0

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.1.0.yml

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and verify v0.1.0 tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          target_sha="19fbb4ce7a33475cc589cdc81cd350b5e1b70224"

          if git rev-parse -q --verify "refs/tags/v0.1.0" >/dev/null; then
            echo "v0.1.0 tag already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a v0.1.0 "$target_sha" -m "GMF Core v0.1.0"
            git push origin v0.1.0
          fi

          awk '
            /^## \[0\.1\.0\]/ { capture=1; next }
            /^## / && capture { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/v0.1.0-notes.md

          if gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release v0.1.0 already exists"
          else
            gh release create v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "GMF Core v0.1.0" \
              --notes-file /tmp/v0.1.0-notes.md
          fi

          gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null
          gh issue comment 2 \
            --repo "$GITHUB_REPOSITORY" \
            --body "Release verification: GMF Core v0.1.0 tag and GitHub Release are published successfully. Tagged commit: ${target_sha}."
