name: finalize-gmf-core-rename

on:
  push:
    branches:
      - chore/finalize-gmf-core-v0.1.0

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/finalize-gmf-core-v0.1.0
      - name: Replace legacy repository and project names
        shell: bash
        run: |
          set -euo pipefail
          files=$(git grep -Il -e 'github.com/Muhail01/Open-Telemety-System' -e 'Open-Telemety-System' -e 'Open Telemetry System' || true)
          if [ -z "$files" ]; then
            echo "No legacy references found"
            exit 0
          fi
          while IFS= read -r file; do
            sed -i \
              -e 's#github.com/Muhail01/Open-Telemety-System#github.com/Muhail01/GMF-Core#g' \
              -e 's#Open-Telemety-System#GMF-Core#g' \
              -e 's#Open Telemetry System#GMF Core#g' \
              "$file"
          done <<< "$files"
      - name: Commit rename updates
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Repository already uses final GMF Core naming"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: finalize GMF Core repository naming"
          git push origin HEAD:chore/finalize-gmf-core-v0.1.0
