name: generate-dependency-locks

on:
  push:
    branches:
      - chore/dependency-locks

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/dependency-locks
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate Go checksums
        run: go mod tidy
      - name: Generate npm lockfile
        working-directory: sdk/typescript
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit generated lock files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- go.mod go.sum sdk/typescript/package-lock.json; then
            echo "Dependency files already clean"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum sdk/typescript/package-lock.json
          git commit -m "chore: commit dependency lock files"
          git push origin HEAD:chore/dependency-locks
