name: open-telemetry-system-ci

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - run: go mod download
      - name: Test core
        run: go test ./internal/core
      - name: Test HTTP API
        run: go test ./internal/httpapi
      - name: Test demo
        run: go test ./internal/demo
      - name: Test memory adapter
        run: go test ./internal/memory
      - name: Test PostgreSQL adapter
        run: go test ./internal/postgres
      - name: Test command
        run: go test ./cmd/...
      - name: Vet
        run: go vet ./...

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package.json
      - run: npm install
      - run: npm run typecheck
