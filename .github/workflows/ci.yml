name: open-telemetry-system-ci

on:
  push:
  pull_request:

jobs:
  public-boundary-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets and private deployment identifiers
        run: sh scripts/audit_public_repo.sh

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Download locked modules
        run: go mod download
      - name: Verify module checksums
        run: go mod verify
      - name: Test core
        run: go test ./internal/core
      - name: Test HTTP API
        run: go test ./internal/httpapi
      - name: Test demo
        run: go test ./internal/demo
      - name: Test memory adapter
        run: go test ./internal/memory
      - name: Test PostgreSQL adapter
        run: go test ./internal/postgres
      - name: Test outbox worker
        run: go test ./internal/outbox
      - name: Test observability adapter
        run: go test ./internal/observability
      - name: Test commands
        run: go test ./cmd/...
      - name: Vet
        run: go vet ./...

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm audit --audit-level=high
